; ClauLi firmware — ST7789V2 240x280 over SPI, NimBLE peripheral.
; One [common] base, one env per supported ESP32 chip. Per-board GPIOs are
; set with -DPIN_LCD_* / -DPIN_BTN_* (display_cfg.h provides C6 fallbacks).
; Non-C6 pin values are SAMPLE defaults — verify against your wiring (README).

[platformio]
default_envs = esp32c6

[common]
platform = espressif32
framework = arduino
upload_speed = 921600
monitor_speed = 115200
build_src_filter = +<*>
extra_scripts = font_custom_declare.py
; Two OTA slots (1.875 MB each) — firmware is ~1.53 MB so fits with margin.
; Enables BLE OTA flashing via the daemon (see ota.cpp). Switching back to
; huge_app.csv would disable OTA but give a 3.1 MB single slot.
board_build.partitions = min_spiffs.csv

build_flags =
    ; NimBLE роли/подключения форсятся предсобранным sdkconfig.h
    ; (ROLE_* =1, MAX_CONNECTIONS=3); задавать их флагами бесполезно и
    ; вызывает "redefined" warnings — поэтому здесь их нет.
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=0
    -DLV_LVGL_H_INCLUDE_SIMPLE
    ; Built-in Montserrat: keep only 10 (tiny) + 28 (numbers). 12/14/16/20
    ; come from fonts_cyr/ (Cyrillic). Default font = built-in 10.
    -DLV_FONT_MONTSERRAT_10=1
    -DLV_FONT_MONTSERRAT_12=0
    -DLV_FONT_MONTSERRAT_14=0
    -DLV_FONT_MONTSERRAT_16=0
    -DLV_FONT_MONTSERRAT_20=0
    -DLV_FONT_MONTSERRAT_28=1
    -DCONFIG_LV_FONT_DEFAULT_MONTSERRAT_10

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1

; ─── ESP32-C6 — NanoESP32-C6 v1.0 (reference / verified wiring) ───
[env:esp32c6]
extends = common
board = sparkfun_esp32c6_thing_plus
; Pins: display_cfg.h C6 defaults (MOSI10 SCLK23 CS5 DC4 RST6 BL7 BOOT9 A7 B6)
build_flags =
    ${common.build_flags}

; ─── ESP32-C6 colour self-test — synthetic 0→100% sweep on emo ───
[env:esp32c6_test]
extends = common
board = sparkfun_esp32c6_thing_plus
build_flags =
    ${common.build_flags}
    -DEMO_SELFTEST=1

; ─── ESP32-S3 — esp32-s3-devkitc-1 (SAMPLE pins — verify) ───
[env:esp32s3]
extends = common
board = esp32-s3-devkitc-1
build_flags =
    ${common.build_flags}
    -DPIN_LCD_MOSI=11 -DPIN_LCD_SCLK=12 -DPIN_LCD_CS=10
    -DPIN_LCD_DC=13 -DPIN_LCD_RESET=14 -DPIN_LCD_BL=21
    -DPIN_BTN_BOOT=0 -DPIN_BTN_A=4 -DPIN_BTN_B=5

; ─── ESP32 classic — esp32dev (SAMPLE pins — verify) ───
[env:esp32]
extends = common
board = esp32dev
build_flags =
    ${common.build_flags}
    -DPIN_LCD_MOSI=23 -DPIN_LCD_SCLK=18 -DPIN_LCD_CS=5
    -DPIN_LCD_DC=2 -DPIN_LCD_RESET=4 -DPIN_LCD_BL=32
    -DPIN_BTN_BOOT=0 -DPIN_BTN_A=34 -DPIN_BTN_B=35

; ─── ESP32-C3 — esp32-c3-devkitm-1 (SAMPLE pins — verify) ───
[env:esp32c3]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    ${common.build_flags}
    -DPIN_LCD_MOSI=6 -DPIN_LCD_SCLK=4 -DPIN_LCD_CS=7
    -DPIN_LCD_DC=5 -DPIN_LCD_RESET=8 -DPIN_LCD_BL=3
    -DPIN_BTN_BOOT=9 -DPIN_BTN_A=1 -DPIN_BTN_B=0
