<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClauLi · EMO 2.0 — emotion candidates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;700&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050505;--surface:#0e0e0e;--surface2:#181818;
  --text:#f5f5f5;--dim:#8a8a8a;
  --cyan:#3DE0E0;--amber:#FFB02E;--red:#FF4D4D;--pink:#FF6B9D;
  --line:rgba(255,255,255,.07);
}
html,body{background:var(--bg);color:var(--text);font-family:'Onest',system-ui,sans-serif;line-height:1.55}
.shell{max-width:1280px;margin:0 auto;padding:0 24px}
header{padding:48px 0 24px;text-align:center;border-bottom:1px solid var(--line)}
.tag{display:inline-block;font-family:'Azeret Mono';font-size:10px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;padding:5px 11px;border:1px solid rgba(61,224,224,.3);border-radius:100px;margin-bottom:18px}
h1{font-size:clamp(32px,4.6vw,52px);font-weight:600;letter-spacing:-1.2px;margin-bottom:14px}
h1 .accent{color:var(--cyan)}
.lead{color:var(--dim);font-size:16px;max-width:680px;margin:0 auto}
.toolbar{position:sticky;top:0;background:rgba(5,5,5,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:50;padding:14px 0}
.toolbar .row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.count{font-family:'Azeret Mono';font-size:12px;color:var(--dim)}
.count strong{color:var(--cyan);font-weight:700}
.btn{padding:10px 18px;border-radius:7px;font-family:'Onest';font-weight:500;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--text);transition:all .15s}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--cyan);color:#000;border-color:transparent;font-weight:600}
.grid{padding:28px 0 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;transition:all .2s;display:flex;flex-direction:column}
.card.picked{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan),0 14px 30px rgba(61,224,224,.10)}
.card h3{font-size:15px;font-weight:600;margin-bottom:4px}
.card .desc{font-size:12px;color:var(--dim);line-height:1.5;min-height:48px;margin-bottom:12px}
.card canvas{width:100%;aspect-ratio:2/1;display:block;border-radius:8px;background:#000;margin-bottom:8px}
.card .timing{font-family:'Azeret Mono';font-size:10px;color:var(--dim);margin-bottom:10px}
.card .ftr{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;color:var(--dim)}
.card .ftr label{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.card .ftr input{appearance:none;width:18px;height:18px;border:1.5px solid rgba(255,255,255,.2);border-radius:5px;cursor:pointer;background:transparent;display:grid;place-items:center;transition:all .15s}
.card .ftr input:checked{background:var(--cyan);border-color:var(--cyan)}
.card .ftr input:checked::after{content:'✓';color:#000;font-weight:700;font-size:12px;line-height:1}
.card .id{font-family:'Azeret Mono';font-size:10px;color:#555;letter-spacing:1.5px}
.result{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--cyan);border-radius:12px;padding:18px 22px;max-width:380px;box-shadow:0 30px 70px rgba(0,0,0,.55);display:none}
.result.show{display:block}
.result h4{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:8px;font-family:'Azeret Mono'}
.result code{display:block;font-family:'Azeret Mono';font-size:12px;color:var(--text);background:#000;padding:10px;border-radius:6px;margin:8px 0;white-space:pre-wrap;word-break:break-all}
footer{text-align:center;color:var(--dim);font-size:12px;padding:30px 0 50px;border-top:1px solid var(--line)}
</style>
</head>
<body>

<header><div class="shell">
  <div class="tag">emotions v2 · composite scenes</div>
  <h1>EMO 2.0 — <span class="accent">эмоции v2</span></h1>
  <p class="lead">20 многофазных сценариев — каждый со своим самостоятельным рендером. Длительность 3–5 с, чёткие фазы, видимые переходы. Кликните по чек-боксу — снизу выпадет список ID.</p>
</div></header>

<div class="toolbar"><div class="shell row">
  <span class="count"><strong id="picked">0</strong> / 20 выбрано</span>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="selectAll(true)">Выбрать все</button>
    <button class="btn" onclick="selectAll(false)">Очистить</button>
    <button class="btn primary" onclick="showResult()">Готово →</button>
  </div>
</div></div>

<div class="shell"><div class="grid" id="grid"></div></div>

<div class="result" id="result">
  <h4>К имплементации</h4>
  <code id="resultText"></code>
  <button class="btn" style="margin-top:10px" onclick="closeResult()">Закрыть</button>
</div>

<footer><div class="shell">ClauLi · EMO 2.0 emotion candidates v2</div></footer>

<script>
const TAU = Math.PI * 2;
const CYAN  = '#3DE0E0';
const AMBER = '#FFB02E';
const RED   = '#FF4D4D';
const PINK  = '#FF6B9D';

// ─────────────────────────── shape paths (centred) ─────────────────────────
function pSquircle(ctx, r, n=4){
  ctx.beginPath();
  for (let i=0;i<=64;i++){
    const t=(i/64)*TAU, ct=Math.cos(t), st=Math.sin(t);
    const x = Math.sign(ct)*Math.pow(Math.abs(ct), 2/n)*r;
    const y = Math.sign(st)*Math.pow(Math.abs(st), 2/n)*r;
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
}
function pCircle(ctx, r){ ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.closePath(); }
function pOvalTall(ctx, r){ ctx.beginPath(); ctx.ellipse(0,0,r*0.78,r*1.10,0,0,TAU); ctx.closePath(); }
function pArcTop(ctx, r){
  // ⌒  Top arch: bottom is flat-ish curve. Use thick crescent (top of ellipse)
  ctx.save(); ctx.translate(0, -r*0.20);
  ctx.beginPath();
  ctx.moveTo(-r, 0);
  ctx.quadraticCurveTo(0, -r*1.4, r, 0);
  ctx.quadraticCurveTo(0, -r*0.3, -r, 0);
  ctx.closePath();
  ctx.restore();
}
function pArcBot(ctx, r){
  // ⌣  Bottom arch (frown)
  ctx.save(); ctx.translate(0, r*0.20);
  ctx.beginPath();
  ctx.moveTo(-r, 0);
  ctx.quadraticCurveTo(0, r*1.4, r, 0);
  ctx.quadraticCurveTo(0, r*0.3, -r, 0);
  ctx.closePath();
  ctx.restore();
}
function pAngry(ctx, r){
  // Lower-half squircle with sharp top edge.
  ctx.save();
  ctx.beginPath();
  pSquircle(ctx, r, 4);
  ctx.clip();
  ctx.beginPath();
  ctx.rect(-r*1.1, -r*0.10, r*2.2, r*1.2);
  ctx.restore();   // restore clip when stroking outside
}
function pSleep(ctx, r){
  ctx.beginPath();
  const w = r*1.05, h = r*0.18;
  ctx.ellipse(0,0,w,h,0,0,TAU);
  ctx.closePath();
}
function pUpset(ctx, r){ pSquircle(ctx, r*0.55, 4); }
function pHeart(ctx, r){
  ctx.beginPath();
  ctx.moveTo(0, r*0.35);
  ctx.bezierCurveTo(r*1.1, r*0.15, r*0.95, -r*0.65, 0, -r*0.18);
  ctx.bezierCurveTo(-r*0.95, -r*0.65, -r*1.1, r*0.15, 0, r*0.35);
  ctx.closePath();
}

// Drawing primitive: an eye with halo + base + (optional) highlight + spec.
// For ANGRY (clipped shape) we render directly without the highlight path.
function drawEye(ctx, cx, cy, opts){
  const { kind='squircle', color=CYAN, r=36, dx=0, dy=0,
          scaleY=1, scale=1, pupil=null, withHighlight=true,
          withSpec=true, rotation=0 } = opts;
  if (scaleY < 0.04) return;
  ctx.save();
  ctx.translate(cx+dx, cy+dy);
  if (rotation) ctx.rotate(rotation);
  ctx.scale(scale, scale*scaleY);

  const pathFn = (() => {
    switch (kind) {
      case 'circle':    return ()=>pCircle(ctx, r);
      case 'oval_tall': return ()=>pOvalTall(ctx, r);
      case 'arc_top':   return ()=>pArcTop(ctx, r);
      case 'arc_bot':   return ()=>pArcBot(ctx, r);
      case 'upset':     return ()=>pUpset(ctx, r);
      case 'sleep':     return ()=>pSleep(ctx, r);
      case 'heart':     return ()=>pHeart(ctx, r);
      case 'squircle':
      default:          return ()=>pSquircle(ctx, r, 4);
    }
  })();

  // halo bloom — render TWICE to fake a soft gradient halo
  ctx.save();
  ctx.shadowColor = color; ctx.shadowBlur = 40;
  ctx.globalAlpha = 0.55; ctx.fillStyle = color;
  pathFn(); ctx.fill();
  ctx.shadowBlur = 22; ctx.globalAlpha = 0.85;
  pathFn(); ctx.fill();
  ctx.restore();

  // base eye (sharp)
  ctx.fillStyle = color; ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  pathFn(); ctx.fill();

  // inner radial highlight for 3-D feel (skip for "flat" shapes)
  if (withHighlight && !['heart','sleep','arc_top','arc_bot'].includes(kind)) {
    const g = ctx.createRadialGradient(-r*0.20,-r*0.25,r*0.05, 0,0,r*0.6);
    g.addColorStop(0,'rgba(255,255,255,.55)');
    g.addColorStop(0.5,'rgba(255,255,255,.10)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    pathFn(); ctx.fill();
  }

  // pupil overlay (black) — for pupil-style emotions
  if (pupil) {
    const [px, py, pr] = pupil;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(r*px, r*py, r*pr, 0, TAU); ctx.closePath(); ctx.fill();
  }

  // specular dot
  if (withSpec && !['heart','sleep','arc_top','arc_bot'].includes(kind) && scaleY > 0.4) {
    ctx.beginPath();
    ctx.ellipse(-r*0.20,-r*0.25, r*0.12, r*0.08, 0, 0, TAU);
    ctx.fillStyle='#fff'; ctx.globalAlpha=0.85; ctx.fill();
  }
  ctx.restore();
}

// X-eye is a special case: a circle with a black X overlay.
function drawXEye(ctx, cx, cy, opts){
  drawEye(ctx, cx, cy, {...opts, kind:'circle', withHighlight:false, withSpec:false});
  const { r=36, dx=0, dy=0, scale=1, scaleY=1 } = opts;
  if (scaleY < 0.04) return;
  ctx.save();
  ctx.translate(cx+dx, cy+dy);
  ctx.scale(scale, scale*scaleY);
  ctx.strokeStyle = '#000'; ctx.lineWidth = r*0.30; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-r*0.55,-r*0.55); ctx.lineTo(r*0.55,r*0.55);
  ctx.moveTo(r*0.55,-r*0.55); ctx.lineTo(-r*0.55,r*0.55);
  ctx.stroke();
  ctx.restore();
}

// ─────────────────────────── easing helpers ────────────────────────────────
const easeInOut = u => u<0.5 ? 2*u*u : 1-Math.pow(-2*u+2, 2)/2;
const smoothPulse = (u) => Math.sin(u*Math.PI); // 0→1→0 over u∈[0,1]
const clamp01 = u => Math.max(0, Math.min(1, u));

// ─────────────────────────── 20 emotions ───────────────────────────────────
const EMOTIONS = [];

function addEmotion(id, name, desc, dur, color, draw){
  EMOTIONS.push({id, name, desc, dur, color, draw});
}

// 1 — THINK: pupil looks up, nodding, blink at end
addEmotion('think', 'Think', 'Зрачок вверх → пауза → кивки → blink', 4000, CYAN,
function(ctx,t,W,H){
  const cy0 = H/2 - 4;
  let dy = 0;
  if (t < 1400) dy = -3;
  else if (t < 3400) dy = -3 + Math.sin((t-1400)/2000*TAU*1.5)*4;
  let scaleY = 1;
  if (t >= 3500 && t < 3680) {
    const d = t-3500; scaleY = d<90 ? 1-(d/90)*0.9 : 0.1+((d-90)/90)*0.9;
  }
  const r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  drawEye(ctx, lx, cy0+dy, {kind:'circle', color:CYAN, r, scaleY, pupil:[0,-0.4,0.25]});
  drawEye(ctx, rx, cy0+dy, {kind:'circle', color:CYAN, r, scaleY, pupil:[0,-0.4,0.25]});
});

// 2 — GREET WAVE: wink left → wave horizontal → smile
addEmotion('greet_wave', 'Greet wave', 'Wink левый → волна 2с → улыбка', 4500, CYAN,
function(ctx,t,W,H){
  const cy = H/2;
  const r=38, gap=36, lx0=W/2-r-gap/2, rx0=W/2+r+gap/2;
  let kind = (t < 3200) ? 'circle' : 'arc_top';
  let dx = 0;
  if (t >= 600 && t < 2800) dx = Math.sin((t-600)/2200*TAU*2)*10;
  let scaleY_L = 1;
  if (t < 200) { const d=t; scaleY_L = d<100 ? 1-(d/100)*0.9 : 0.1+((d-100)/100)*0.9; }
  drawEye(ctx, lx0+dx, cy, {kind, color:CYAN, r, scaleY:scaleY_L});
  drawEye(ctx, rx0+dx, cy, {kind, color:CYAN, r});
});

// 3 — SURPRISED PAUSE
addEmotion('surprised_pause', 'Surprised pause', 'Shrink → pop → squint', 3000, AMBER,
function(ctx,t,W,H){
  const cy = H/2, r=38, gap=36;
  let scale=1, kind='circle';
  if (t < 400) scale = 0.55;
  else if (t < 900) { scale = 0.55 + (1.20-0.55)*smoothPulse((t-400)/500); scale = Math.max(scale, 1); }
  else if (t < 1900) scale = 1;
  else { kind='sleep'; scale = 1; }
  const lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  drawEye(ctx, lx, cy, {kind, color:AMBER, r, scale});
  drawEye(ctx, rx, cy, {kind, color:AMBER, r, scale});
});

// 4 — SKEPTICAL: alt squint, then eye-roll
addEmotion('skeptical', 'Skeptical', 'Прищур L → прищур R → eye-roll', 4200, AMBER,
function(ctx,t,W,H){
  const cy = H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  let scaleL=1, scaleR=1, dx=0, dy=0;
  if (t < 900) scaleL = 0.45;
  else if (t < 1800) scaleR = 0.45;
  else {
    const u = (t-1800)/2400;
    const a = u*TAU;
    dx = Math.cos(a)*8; dy = Math.sin(a)*5;
  }
  drawEye(ctx, lx+dx, cy+dy, {kind:'circle', color:AMBER, r, scaleY:scaleL, pupil:[0,0,0.25]});
  drawEye(ctx, rx+dx, cy+dy, {kind:'circle', color:AMBER, r, scaleY:scaleR, pupil:[0,0,0.25]});
});

// 5 — CRY: sad arc + falling teardrop
addEmotion('cry', 'Cry', 'Грустная дуга + падающая слеза', 4000, CYAN,
function(ctx,t,W,H){
  const cy = H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  drawEye(ctx, lx, cy+4, {kind:'arc_bot', color:CYAN, r});
  drawEye(ctx, rx, cy+4, {kind:'arc_bot', color:CYAN, r});
  // teardrops, falling repeatedly every 1.4s
  for (let off=0; off<2; off++){
    const ph = ((t + off*700) % 1400) / 1400;
    const tx = (off===0 ? lx : rx) - 8;
    const ty = cy + 24 + ph*70;
    ctx.save();
    ctx.globalAlpha = 1 - ph;
    ctx.fillStyle = CYAN;
    ctx.shadowColor = CYAN; ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.ellipse(tx, ty, 5, 8, 0, 0, TAU); ctx.fill();
    ctx.restore();
  }
});

// 6 — LAUGH: happy arc + bouncing + sparkles
addEmotion('laugh', 'Laugh', 'Happy-arc + bounce × 3 + блестки', 3200, CYAN,
function(ctx,t,W,H){
  const cy0 = H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  // 3 bounces over duration
  const u = t/3200;
  const dy = -8 * (1-u) * Math.abs(Math.sin(u*TAU*3));
  drawEye(ctx, lx, cy0+dy, {kind:'arc_top', color:CYAN, r});
  drawEye(ctx, rx, cy0+dy, {kind:'arc_top', color:CYAN, r});
  // sparkles around eyes
  ctx.save(); ctx.fillStyle = '#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=12;
  for (let i=0; i<3; i++) {
    const ph = ((t + i*500) % 1500) / 1500;
    const ang = i*TAU/3 + t/600;
    const sx = (i%2===0?lx:rx) + Math.cos(ang)*42;
    const sy = cy0 + Math.sin(ang)*32 - 8 - ph*15;
    const sz = 5 * (1-ph);
    ctx.globalAlpha = 1-ph;
    drawSparkle(ctx, sx, sy, sz);
  }
  ctx.restore();
});

// 7 — STUNNED: X eyes, scale-up then shake
addEmotion('stunned', 'Stunned', 'X-eyes + scale-up + shake', 3200, RED,
function(ctx,t,W,H){
  const cy = H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  let scale=1, dx=0;
  if (t < 700) scale = 0.55 + 0.55*easeInOut(t/700);
  else { const u=(t-700)/2500; dx = 4*(1-u)*Math.sin((t-700)*0.07); }
  drawXEye(ctx, lx+dx, cy, {color:RED, r, scale});
  drawXEye(ctx, rx+dx, cy, {color:RED, r, scale});
});

// 8 — SLEEP CYCLE: yawn → squint → slit + Z's
addEmotion('sleep_cycle', 'Sleep cycle', 'Yawn (стретч) → щель + Z', 5000, CYAN,
function(ctx,t,W,H){
  const cy = H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  let kind='oval_tall', scale=1;
  if (t < 1100) { scale = 1 + 0.30*Math.sin(t/1100*Math.PI); kind='oval_tall'; }
  else if (t < 2000) { kind='upset'; }
  else { kind='sleep'; }
  drawEye(ctx, lx, cy, {kind, color:CYAN, r, scale});
  drawEye(ctx, rx, cy, {kind, color:CYAN, r, scale});
  // Z's start after slit
  if (t >= 2000) {
    const dz = t - 2000;
    for (let i=0; i<3; i++) {
      const ph = ((dz + i*900) % 2700) / 2700;
      ctx.save();
      ctx.globalAlpha = 1 - ph;
      ctx.fillStyle = CYAN;
      ctx.shadowColor = CYAN; ctx.shadowBlur = 10;
      ctx.font = `600 ${22 - i*4}px Onest, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('z', rx + 30 + ph*24, cy - 18 - ph*60);
      ctx.restore();
    }
  }
});

// 9 — WAKE UP
addEmotion('wake_up', 'Wake up', 'Щель → wide pop → neutral', 2800, CYAN,
function(ctx,t,W,H){
  const cy = H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  let kind, scale=1;
  if (t < 900) kind = 'sleep';
  else if (t < 1400) {
    kind = 'circle';
    scale = 0.6 + 0.55 * easeInOut((t-900)/500);
  }
  else { kind = 'squircle'; }
  drawEye(ctx, lx, cy, {kind, color:CYAN, r, scale});
  drawEye(ctx, rx, cy, {kind, color:CYAN, r, scale});
});

// 10 — CURIOUS: pupil tracking corners + tilt
addEmotion('curious', 'Curious', 'Зрачок ↖ → ↗ → tilt', 4200, CYAN,
function(ctx,t,W,H){
  const cy=H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  let px=0, py=0, tilt=0;
  if (t < 1200) { px=-0.35; py=-0.20; }
  else if (t < 2400) { px=0.35; py=-0.20; }
  else { px=0; py=0; tilt = Math.sin((t-2400)/1800*TAU)*0.10; }
  drawEye(ctx, lx, cy, {kind:'circle', color:CYAN, r, pupil:[px,py,0.22], rotation:tilt});
  drawEye(ctx, rx, cy, {kind:'circle', color:CYAN, r, pupil:[px,py,0.22], rotation:tilt});
});

// 11 — CONFUSED: ? overlay + asymmetric
addEmotion('confused', 'Confused', '? над правым + асимметрия', 3400, AMBER,
function(ctx,t,W,H){
  const cy=H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  const sR = 0.80 + 0.20*Math.sin(t/450);
  drawEye(ctx, lx, cy, {kind:'circle', color:AMBER, r});
  drawEye(ctx, rx, cy, {kind:'circle', color:AMBER, r, scale:sR});
  if (t > 700) {
    ctx.save();
    ctx.fillStyle = AMBER;
    ctx.shadowColor = AMBER; ctx.shadowBlur = 14;
    ctx.font = 'bold 38px Onest, sans-serif';
    ctx.textAlign = 'center';
    ctx.globalAlpha = clamp01((t-700)/400);
    ctx.fillText('?', rx + 32, cy - 38 - Math.sin(t/600)*4);
    ctx.restore();
  }
});

// 12 — ANNOYED: angry + slow shake + warm halo pulse
addEmotion('annoyed', 'Annoyed', 'Angry + лёгкий shake + тёплый halo', 3000, AMBER,
function(ctx,t,W,H){
  const cy=H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  const dx = Math.sin(t/170)*1.8;
  const pulse = 1 + 0.10*Math.sin(t/400);
  // angry shape: use squircle with sharp top cut → we draw a clipped rect
  drawEye(ctx, lx+dx, cy, {kind:'circle', color:AMBER, r:r*pulse, scaleY:0.55, dy:r*0.30});
  drawEye(ctx, rx+dx, cy, {kind:'circle', color:AMBER, r:r*pulse, scaleY:0.55, dy:r*0.30});
});

// 13 — EXCITED: heart eyes + bounce + sparkles
addEmotion('excited', 'Excited', 'Heart eyes + bounce + блестки', 3200, PINK,
function(ctx,t,W,H){
  const cy0=H/2, r=40, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  const u=t/3200;
  const dy = -10 * (1-u) * Math.abs(Math.sin(u*TAU*3));
  const scale = 1 + 0.08*Math.sin(t/250);
  drawEye(ctx, lx, cy0+dy, {kind:'heart', color:PINK, r, scale});
  drawEye(ctx, rx, cy0+dy, {kind:'heart', color:PINK, r, scale});
  ctx.save(); ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=10;
  for (let i=0; i<5; i++) {
    const ph = ((t + i*400) % 1500) / 1500;
    const ang = i*TAU/5;
    const sx = W/2 + Math.cos(ang)*(60+ph*20);
    const sy = cy0 + Math.sin(ang)*(40+ph*15) - 6;
    ctx.globalAlpha = 1-ph;
    drawSparkle(ctx, sx, sy, 4*(1-ph));
  }
  ctx.restore();
});

// 14 — BORED: half-lid + slow nod down
addEmotion('bored', 'Bored', 'Полу-закрыт + медленный кивок вниз', 4000, CYAN,
function(ctx,t,W,H){
  const cy0=H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  const dy = 2 + Math.sin(t/2000*Math.PI)*3;
  const scaleY = 0.55;
  drawEye(ctx, lx, cy0+dy, {kind:'circle', color:CYAN, r, scaleY});
  drawEye(ctx, rx, cy0+dy, {kind:'circle', color:CYAN, r, scaleY});
});

// 15 — FOCUS: pupil slit (vertical) still + heartbeat halo
addEmotion('focus', 'Focus', 'Вертикальная щель + heartbeat', 3000, CYAN,
function(ctx,t,W,H){
  const cy=H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  const pulse = 1 + 0.06*Math.sin(t/350);
  drawEye(ctx, lx, cy, {kind:'circle', color:CYAN, r:r*pulse});
  drawEye(ctx, rx, cy, {kind:'circle', color:CYAN, r:r*pulse});
  // vertical slit pupil overlay
  for (const cx of [lx, rx]) {
    ctx.save();
    ctx.fillStyle = '#000'; ctx.translate(cx, cy);
    ctx.beginPath(); ctx.ellipse(0,0,r*0.10*pulse, r*0.65*pulse, 0, 0, TAU);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
});

// 16 — SCARED: wide oval + tremor
addEmotion('scared', 'Scared', 'Wide oval-tall + дрожь', 3200, CYAN,
function(ctx,t,W,H){
  const cy=H/2, r=40, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  const tx = Math.sin(t/35)*2 + Math.cos(t/52)*1.5;
  const ty = Math.cos(t/40)*1.5;
  drawEye(ctx, lx+tx, cy+ty, {kind:'oval_tall', color:CYAN, r, scale:1.12, pupil:[0,0,0.18]});
  drawEye(ctx, rx+tx, cy+ty, {kind:'oval_tall', color:CYAN, r, scale:1.12, pupil:[0,0,0.18]});
});

// 17 — SMUG: smile + wink + halo flash
addEmotion('smug', 'Smug', 'Улыбка + wink + вспышка halo', 2800, CYAN,
function(ctx,t,W,H){
  const cy=H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  let scaleY_L = 1;
  if (t < 240) { const d=t; scaleY_L = d<120 ? 1-(d/120)*0.9 : 0.1+((d-120)/120)*0.9; }
  let halo = 1;
  if (t >= 900 && t < 1300) halo = 1 + 0.35*(1-(t-900)/400);
  drawEye(ctx, lx, cy, {kind:'arc_top', color:CYAN, r:r*halo, scaleY:scaleY_L});
  drawEye(ctx, rx, cy, {kind:'arc_top', color:CYAN, r:r*halo});
});

// 18 — DISAGREE: head shake horizontal + frown
addEmotion('disagree', 'Disagree', 'Покачивание + frown', 2800, AMBER,
function(ctx,t,W,H){
  const cy=H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  const dx = Math.sin(t/180)*8;
  drawEye(ctx, lx+dx, cy+4, {kind:'arc_bot', color:AMBER, r});
  drawEye(ctx, rx+dx, cy+4, {kind:'arc_bot', color:AMBER, r});
});

// 19 — ACKNOWLEDGE: nod + blink + smile
addEmotion('acknowledge', 'Acknowledge', 'Кивок + blink + улыбка', 2600, CYAN,
function(ctx,t,W,H){
  const cy0=H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  const dy = 3*Math.sin((t/1800)*TAU);
  let scaleY = 1;
  if (t >= 1900 && t < 2080) { const d=t-1900; scaleY = d<90 ? 1-(d/90)*0.9 : 0.1+((d-90)/90)*0.9; }
  const kind = (t < 1500) ? 'circle' : 'arc_top';
  drawEye(ctx, lx, cy0+dy, {kind, color:CYAN, r, scaleY});
  drawEye(ctx, rx, cy0+dy, {kind, color:CYAN, r, scaleY});
});

// 20 — LOADING: circle eyes, pupil rotates around the circumference
addEmotion('loading', 'Loading', 'Circle + зрачок по кругу', 2400, CYAN,
function(ctx,t,W,H){
  const cy=H/2, r=38, gap=36, lx=W/2-r-gap/2, rx=W/2+r+gap/2;
  const u = (t/2400)*TAU;
  const px = Math.cos(u)*0.45;
  const py = Math.sin(u)*0.45;
  drawEye(ctx, lx, cy, {kind:'circle', color:CYAN, r, pupil:[px,py,0.18]});
  drawEye(ctx, rx, cy, {kind:'circle', color:CYAN, r, pupil:[px,py,0.18]});
});

// ─────────────────────────── helper: sparkle ─────────────────────────────
function drawSparkle(ctx, cx, cy, s){
  ctx.beginPath();
  ctx.moveTo(cx, cy-s); ctx.lineTo(cx+s*0.3, cy-s*0.3);
  ctx.lineTo(cx+s, cy); ctx.lineTo(cx+s*0.3, cy+s*0.3);
  ctx.lineTo(cx, cy+s); ctx.lineTo(cx-s*0.3, cy+s*0.3);
  ctx.lineTo(cx-s, cy); ctx.lineTo(cx-s*0.3, cy-s*0.3);
  ctx.closePath(); ctx.fill();
}

// ─────────────────────────── card builder + loop ───────────────────────────
const grid = document.getElementById('grid');
EMOTIONS.forEach((em, i) => {
  const c = document.createElement('div');
  c.className = 'card'; c.dataset.id = em.id;
  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:6px">
      <h3>${em.name}</h3>
      <span class="id">#${String(i+1).padStart(2,'0')}</span>
    </div>
    <div class="desc">${em.desc}</div>
    <canvas width="480" height="240"></canvas>
    <div class="timing">${em.dur} ms · ${em.color === CYAN ? 'cyan' : em.color === AMBER ? 'amber' : em.color === RED ? 'red' : 'pink'}</div>
    <div class="ftr">
      <label><input type="checkbox"><span>Включить</span></label>
      <span class="id">${em.id}</span>
    </div>`;
  const cv = c.querySelector('canvas');
  em.ctx = cv.getContext('2d'); em.cv = cv;
  c.querySelector('input').addEventListener('change', e => {
    em.picked = e.target.checked;
    c.classList.toggle('picked', em.picked);
    updateCount();
  });
  grid.appendChild(c);
});

function loop(now){
  for (const em of EMOTIONS) {
    const t = now % em.dur;
    em.ctx.clearRect(0, 0, em.cv.width, em.cv.height);
    try { em.draw(em.ctx, t, em.cv.width, em.cv.height); } catch(e){ console.error(em.id, e); }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function updateCount(){
  document.getElementById('picked').textContent = EMOTIONS.filter(e=>e.picked).length;
}
function selectAll(v){
  EMOTIONS.forEach(e=>e.picked=v);
  document.querySelectorAll('.card input').forEach(c=>c.checked=v);
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('picked',v));
  updateCount();
}
function showResult(){
  const ids = EMOTIONS.filter(e=>e.picked).map(e=>e.id);
  document.getElementById('resultText').textContent = ids.length ? ids.join(', ') : '(пусто)';
  document.getElementById('result').classList.add('show');
}
function closeResult(){ document.getElementById('result').classList.remove('show'); }
</script>
