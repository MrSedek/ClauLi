<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClauLi · EMO 2.0 — form candidates v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;700&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050505;--surface:#0e0e0e;--surface2:#181818;
  --text:#f5f5f5;--dim:#8a8a8a;
  --cyan:#3DE0E0;--cyan-soft:rgba(61,224,224,.16);
  --line:rgba(255,255,255,.07);
}
html,body{background:var(--bg);color:var(--text);font-family:'Onest',system-ui,sans-serif;line-height:1.55}
.shell{max-width:1280px;margin:0 auto;padding:0 24px}
header{padding:48px 0 24px;text-align:center;border-bottom:1px solid var(--line)}
.tag{display:inline-block;font-family:'Azeret Mono';font-size:10px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;padding:5px 11px;border:1px solid rgba(61,224,224,.3);border-radius:100px;margin-bottom:18px}
h1{font-size:clamp(32px,4.6vw,52px);font-weight:600;letter-spacing:-1.2px;margin-bottom:14px}
h1 .accent{color:var(--cyan)}
.lead{color:var(--dim);font-size:16px;max-width:660px;margin:0 auto}
.toolbar{position:sticky;top:0;background:rgba(5,5,5,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:50;padding:14px 0}
.toolbar .row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.count{font-family:'Azeret Mono';font-size:12px;color:var(--dim)}
.count strong{color:var(--cyan);font-weight:700}
.btn{padding:10px 18px;border-radius:7px;font-family:'Onest';font-weight:500;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--text);transition:all .15s}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--cyan);color:#000;border-color:transparent;font-weight:600}
.grid{padding:28px 0 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;transition:all .2s;display:flex;flex-direction:column}
.card.picked{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan),0 14px 30px rgba(61,224,224,.10)}
.card h3{font-size:14px;font-weight:600;margin-bottom:4px}
.card .desc{font-size:12px;color:var(--dim);line-height:1.5;min-height:36px;margin-bottom:12px}
.card canvas{width:100%;aspect-ratio:2/1;display:block;border-radius:8px;background:#000;margin-bottom:14px}
.card .ftr{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;color:var(--dim)}
.card .ftr label{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.card .ftr input{appearance:none;width:18px;height:18px;border:1.5px solid rgba(255,255,255,.2);border-radius:5px;cursor:pointer;background:transparent;display:grid;place-items:center;transition:all .15s}
.card .ftr input:checked{background:var(--cyan);border-color:var(--cyan)}
.card .ftr input:checked::after{content:'✓';color:#000;font-weight:700;font-size:12px;line-height:1}
.card .id{font-family:'Azeret Mono';font-size:10px;color:#555;letter-spacing:1.5px}
.result{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--cyan);border-radius:12px;padding:18px 22px;max-width:380px;box-shadow:0 30px 70px rgba(0,0,0,.55);display:none}
.result.show{display:block}
.result h4{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:8px;font-family:'Azeret Mono'}
.result code{display:block;font-family:'Azeret Mono';font-size:12px;color:var(--text);background:#000;padding:10px;border-radius:6px;margin:8px 0;white-space:pre-wrap;word-break:break-all}
footer{text-align:center;color:var(--dim);font-size:12px;padding:30px 0 50px;border-top:1px solid var(--line)}
</style>
</head>
<body>

<header><div class="shell">
  <div class="tag">forms v2 · 20 new candidates</div>
  <h1>EMO 2.0 — <span class="accent">формы v2</span></h1>
  <p class="lead">20 новых форм, не пересекающихся с уже реализованными. Отметьте те, что хотите добавить — снизу появится список ID.</p>
</div></header>

<div class="toolbar"><div class="shell row">
  <span class="count"><strong id="picked">0</strong> / 20 выбрано</span>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="selectAll(true)">Выбрать все</button>
    <button class="btn" onclick="selectAll(false)">Очистить</button>
    <button class="btn primary" onclick="showResult()">Готово →</button>
  </div>
</div></div>

<div class="shell"><div class="grid" id="grid"></div></div>

<div class="result" id="result">
  <h4>Список к имплементации</h4>
  <code id="resultText"></code>
  <button class="btn" style="margin-top:10px" onclick="closeResult()">Закрыть</button>
</div>

<footer><div class="shell">ClauLi · EMO 2.0 form candidates v2</div></footer>

<script>
const TAU = Math.PI * 2;
const CYAN = '#3DE0E0';

// ─────────────────────────── shape primitives ──────────────────────────────
function squircle(ctx, w, h, n){
  n = n || 4;
  ctx.beginPath();
  const a = w/2, b = h/2;
  for (let i=0;i<=72;i++){
    const t = (i/72)*TAU, ct=Math.cos(t), st=Math.sin(t);
    const x = Math.sign(ct)*Math.pow(Math.abs(ct), 2/n)*a;
    const y = Math.sign(st)*Math.pow(Math.abs(st), 2/n)*b;
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
}
function rect_tv(ctx,r){ ctx.beginPath(); const w=r*1.7,h=r*1.2,rd=r*0.25;
  ctx.roundRect(-w/2,-h/2,w,h,rd); ctx.closePath(); }
function hexagon(ctx,r){ ctx.beginPath();
  for(let i=0;i<6;i++){ const a=Math.PI/6+i*Math.PI/3; const x=Math.cos(a)*r,y=Math.sin(a)*r;
    if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);} ctx.closePath(); }
function trapezoid(ctx,r){ ctx.beginPath();
  ctx.moveTo(-r*0.55,-r); ctx.lineTo(r*0.55,-r); ctx.lineTo(r,r); ctx.lineTo(-r,r); ctx.closePath(); }
function teardrop_down(ctx,r){ ctx.beginPath();
  ctx.moveTo(0,r); ctx.bezierCurveTo(r,r*0.4,r,-r*0.7,0,-r);
  ctx.bezierCurveTo(-r,-r*0.7,-r,r*0.4,0,r); ctx.closePath(); }
function teardrop_up(ctx,r){ ctx.beginPath();
  ctx.moveTo(0,-r); ctx.bezierCurveTo(r,-r*0.4,r,r*0.7,0,r);
  ctx.bezierCurveTo(-r,r*0.7,-r,-r*0.4,0,-r); ctx.closePath(); }
function capsule_h(ctx,r){ ctx.beginPath();
  const w=r*1.6, h=r*0.6; ctx.roundRect(-w/2,-h/2,w,h,h/2); ctx.closePath(); }
function capsule_v(ctx,r){ ctx.beginPath();
  const w=r*0.55, h=r*1.5; ctx.roundRect(-w/2,-h/2,w,h,w/2); ctx.closePath(); }
function pacman(ctx,r){ ctx.beginPath();
  ctx.moveTo(0,0); ctx.arc(0,0,r, -0.35*TAU, 0.15*TAU, false); ctx.closePath(); }
function triangle_blunt(ctx,r){ ctx.beginPath();
  const t=r*0.18;
  ctx.moveTo(-t,-r*0.7); ctx.lineTo(t,-r*0.7);
  ctx.lineTo(r*0.85,r*0.65); ctx.lineTo(-r*0.85,r*0.65); ctx.closePath(); }
function star8(ctx,r){ ctx.beginPath();
  for(let i=0;i<16;i++){ const a=i*Math.PI/8 - Math.PI/2;
    const rr = (i%2===0)?r:r*0.45;
    const x=Math.cos(a)*rr,y=Math.sin(a)*rr;
    if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);} ctx.closePath(); }
function crescent(ctx,r){
  // outer circle minus offset inner circle via evenodd
  ctx.beginPath();
  ctx.arc(0,0,r,0,TAU);
  ctx.arc(r*0.35,0,r*0.85,0,TAU,true);
  ctx.closePath();
}
function brackets(ctx,r){ ctx.beginPath();
  const t=r*0.20;
  ctx.rect(-r*0.95, -r*0.85, t, r*1.7);
  ctx.rect(-r*0.95, -r*0.85, r*0.55, t);
  ctx.rect(-r*0.95, r*0.85-t, r*0.55, t);
  ctx.rect( r*0.75, -r*0.85, t, r*1.7);
  ctx.rect( r*0.4,  -r*0.85, r*0.55, t);
  ctx.rect( r*0.4,  r*0.85-t, r*0.55, t);
}
function lens(ctx,r){ ctx.beginPath();
  ctx.moveTo(-r,0);
  ctx.bezierCurveTo(-r*0.6,-r,r*0.6,-r,r,0);    // curved top
  ctx.lineTo(r,r*0.05);
  ctx.bezierCurveTo(r*0.5,r,-r*0.5,r,-r,r*0.05); // gentle bottom
  ctx.closePath(); }
function pixel_cluster(ctx,r){ ctx.beginPath();
  const grid = 4, gap = 0.10, cell = (2*r-gap*r*5)/grid;
  for(let yy=0;yy<grid;yy++)for(let xx=0;xx<grid;xx++){
    const x = -r + (xx+0.5)*(cell+gap*r) - cell/2 + gap*r;
    const y = -r + (yy+0.5)*(cell+gap*r) - cell/2 + gap*r;
    ctx.rect(x,y,cell,cell);
  } }
function spiral_arms(ctx,r){
  // a thick spiral painted as a fat stroke; fill mode also OK
  ctx.beginPath();
  const turns = 2.3, steps=200;
  for(let i=0;i<=steps;i++){
    const u = i/steps;
    const a = u*TAU*turns;
    const rad = u*r;
    const x = Math.cos(a)*rad, y = Math.sin(a)*rad;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.lineWidth = r*0.18;
  ctx.lineCap = 'round';
  ctx.strokeStyle = CYAN;
  ctx.stroke();
}
function iris_outer(ctx,r){ ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.closePath(); }
function iris_inner(ctx,r){ ctx.beginPath(); ctx.arc(0,0,r*0.45,0,TAU); ctx.closePath(); ctx.fillStyle='#1a4c6d'; ctx.fill(); ctx.beginPath(); ctx.arc(0,0,r*0.18,0,TAU); ctx.closePath(); ctx.fillStyle='#000'; ctx.fill();}
function mecha_slit(ctx,r){ ctx.beginPath();
  const t=r*0.20, h=r*1.6;
  ctx.roundRect(-r*0.45-t/2,-h/2,t,h,t/2);
  ctx.roundRect( r*0.45-t/2,-h/2,t,h,t/2);
}
function q_eye(ctx,r,c){ squircle(ctx,r*1.6,r*1.6,4); ctx.fillStyle=c; ctx.fill();
  ctx.fillStyle='#000'; ctx.font=`bold ${Math.round(r*1.4)}px Onest`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('?',0,r*0.08); }
function exclaim_eye(ctx,r,c){ squircle(ctx,r*1.6,r*1.6,4); ctx.fillStyle=c; ctx.fill();
  ctx.fillStyle='#000'; ctx.font=`bold ${Math.round(r*1.4)}px Onest`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('!',0,r*0.08); }

// ─────────────────────────── candidates ────────────────────────────────────
const CANDIDATES = [
  {id:'squircle_thick', name:'Squircle thick', desc:'Жирный squircle (n=8) — мягче чем sharp.',         draw:(c,r,col)=>{squircle(c,r*1.6,r*1.6,8);}},
  {id:'rect_tv',     name:'Rect TV-era',     desc:'Прямоугольник «телек 90-х» — широкий, scanline-friendly.', draw:(c,r,col)=>{rect_tv(c,r);}},
  {id:'hex',         name:'Hexagon',         desc:'Гексагон — техно-стиль, sci-fi.',                            draw:(c,r,col)=>{hexagon(c,r);}},
  {id:'trapezoid',   name:'Trapezoid',       desc:'Трапеция — устойчивый, серьёзный взгляд.',                   draw:(c,r,col)=>{trapezoid(c,r);}},
  {id:'teardrop_dn', name:'Teardrop down',   desc:'Капля вниз — печаль, слеза.',                                draw:(c,r,col)=>{teardrop_down(c,r);}},
  {id:'teardrop_up', name:'Teardrop up',     desc:'Капля вверх — пламя/радость.',                               draw:(c,r,col)=>{teardrop_up(c,r);}},
  {id:'capsule_h',   name:'Capsule —',       desc:'Горизонтальная капсула — спокойный, расслабленный.',         draw:(c,r,col)=>{capsule_h(c,r);}},
  {id:'capsule_v',   name:'Capsule |',       desc:'Вертикальная капсула — бодрый, узкий.',                      draw:(c,r,col)=>{capsule_v(c,r);}},
  {id:'pacman',      name:'Pacman',          desc:'Круг с вырезом — голод, открытость, разговор.',              draw:(c,r,col)=>{pacman(c,r);}},
  {id:'triangle',    name:'Triangle blunt',  desc:'Тупой треугольник — focus down (брови).',                    draw:(c,r,col)=>{triangle_blunt(c,r);}},
  {id:'star_8',      name:'Star (8 pt)',     desc:'Восьмиконечная звезда — детская радость, восторг.',          draw:(c,r,col)=>{star8(c,r);}},
  {id:'crescent',    name:'Crescent moon',   desc:'Полумесяц — мечтательный, лунный.',                          draw:(c,r,col)=>{ ctx_save_evenodd_fill_via(c,r,crescent); }, evenodd:true},
  {id:'brackets',    name:'Brackets [ ]',    desc:'Технические скобки — режим программирования.',               draw:(c,r,col)=>{brackets(c,r);}},
  {id:'lens',        name:'Lens (plano-convex)', desc:'Плосковыпуклая линза — оптический сенсор.',              draw:(c,r,col)=>{lens(c,r);}},
  {id:'pixel_cluster',name:'Pixel cluster',  desc:'4×4 матрица пикселей — retro, dot-matrix.',                  draw:(c,r,col)=>{pixel_cluster(c,r);}},
  {id:'spiral_arms', name:'Spiral arms',     desc:'Галактика — гипноз/головокружение, можно крутить.',          draw:(c,r,col)=>{spiral_arms(c,r);},   stroke:true},
  {id:'iris',        name:'Iris (bicolor)',  desc:'Двухцветный глаз — внешний halo + цветная радужка + зрачок.', draw:(c,r,col)=>{iris_outer(c,r); ctx_fillpath(c,col); iris_inner(c,r);}, bicolor:true},
  {id:'mecha_slit',  name:'Mecha — 2 slits', desc:'Два вертикальных слита — Megazord, военная техника.',         draw:(c,r,col)=>{mecha_slit(c,r);}},
  {id:'q_eye',       name:'Question ?',      desc:'Глаз с символом «?» внутри — вопрос/любопытство.',           draw:(c,r,col)=>{q_eye(c,r,col);},     prerendered:true},
  {id:'exclaim',     name:'Exclaim !',       desc:'Глаз с «!» — внимание/тревога.',                              draw:(c,r,col)=>{exclaim_eye(c,r,col);}, prerendered:true},
];

function ctx_fillpath(ctx, color){ ctx.fillStyle = color; ctx.fill(); }
function ctx_save_evenodd_fill_via(ctx, r, pathfn){ pathfn(ctx, r); }

// ─────────────────────────── eye render with halo ──────────────────────────
function drawEye(ctx, cx, cy, spec, size){
  ctx.save(); ctx.translate(cx, cy);
  if (spec.stroke) {
    // shape paints itself (spiral)
    spec.draw(ctx, size, CYAN);
    ctx.restore(); return;
  }
  if (spec.prerendered) {
    // bake its own halo
    ctx.shadowColor = CYAN; ctx.shadowBlur = 36;
    spec.draw(ctx, size, CYAN);
    ctx.restore(); return;
  }
  // halo bloom
  ctx.save();
  ctx.fillStyle = CYAN; ctx.shadowColor = CYAN; ctx.shadowBlur = 40;
  ctx.globalAlpha = 0.6;
  ctx.scale(1.05,1.05); spec.draw(ctx, size, CYAN);
  ctx.fill(spec.evenodd ? 'evenodd':'nonzero');
  ctx.restore();
  // base
  ctx.fillStyle = CYAN; ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  spec.draw(ctx, size, CYAN);
  ctx.fill(spec.evenodd ? 'evenodd':'nonzero');
  // inner highlight
  if (!spec.bicolor) {
    const g = ctx.createRadialGradient(-size*0.20,-size*0.25,size*0.05, 0,0,size*0.6);
    g.addColorStop(0,'rgba(255,255,255,.55)');
    g.addColorStop(0.5,'rgba(255,255,255,.10)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    spec.draw(ctx, size, CYAN);
    ctx.fill(spec.evenodd ? 'evenodd':'nonzero');
  }
  ctx.restore();
}

function drawScene(spec, ctx, W, H){
  ctx.clearRect(0,0,W,H);
  const cy = H/2, r = 36, gap = 32;
  drawEye(ctx, W/2 - r - gap/2, cy, spec, r);
  drawEye(ctx, W/2 + r + gap/2, cy, spec, r);
}

// ─────────────────────────── cards ─────────────────────────────────────────
const grid = document.getElementById('grid');
CANDIDATES.forEach((spec, i) => {
  const c = document.createElement('div'); c.className='card'; c.dataset.id=spec.id;
  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:6px">
      <h3>${spec.name}</h3>
      <span class="id">#${String(i+1).padStart(2,'0')}</span>
    </div>
    <div class="desc">${spec.desc}</div>
    <canvas width="440" height="220"></canvas>
    <div class="ftr">
      <label><input type="checkbox"><span>Включить</span></label>
      <span class="id">${spec.id}</span>
    </div>`;
  const cv = c.querySelector('canvas'); spec.ctx = cv.getContext('2d'); spec.cv = cv;
  c.querySelector('input').addEventListener('change', e => {
    spec.picked = e.target.checked;
    c.classList.toggle('picked', spec.picked);
    updateCount();
  });
  grid.appendChild(c);
});

function loop(){
  for (const s of CANDIDATES) drawScene(s, s.ctx, s.cv.width, s.cv.height);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function updateCount(){
  document.getElementById('picked').textContent = CANDIDATES.filter(s=>s.picked).length;
}
function selectAll(v){
  CANDIDATES.forEach(s=>s.picked=v);
  document.querySelectorAll('.card input').forEach(c=>c.checked=v);
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('picked',v));
  updateCount();
}
function showResult(){
  const ids = CANDIDATES.filter(s=>s.picked).map(s=>s.id);
  document.getElementById('resultText').textContent = ids.length ? ids.join(', ') : '(пусто)';
  document.getElementById('result').classList.add('show');
}
function closeResult(){ document.getElementById('result').classList.remove('show'); }
</script>
</body>
</html>
